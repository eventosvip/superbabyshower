<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby Shower - Hello Kitty Magical Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --pastel-pink: #ffd1dc;
      --pink-rock: #ff1493;
      --soft-pink: #ff85a2;
      --white: #ffffff;
      --magic-glow: rgba(255, 255, 255, 0.8);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background-color: var(--pastel-pink);
      touch-action: none;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--pastel-pink) 0%, #fff 100%);
      z-index: -5;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      background-image: url('7.png');
      background-size: 180px;
      opacity: 0.08;
      z-index: -4;
      animation: drift 80s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: 1000px 1000px; }
    }

    /* Partículas Splash Mágico */
    .magic-particle {
      position: absolute;
      pointer-events: none;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 10px var(--pink-rock);
      animation: explode 0.8s ease-out forwards;
      z-index: 999;
    }

    @keyframes explode {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; transform: translate(var(--dx), var(--dy)); }
    }

    #app {
      height: 100%;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 450px;
      min-height: 85vh;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 40px;
      padding: 30px 20px;
      box-shadow: 0 25px 50px rgba(255, 20, 147, 0.25);
      border: 6px solid var(--white);
      display: flex;
      flex-direction: column;
      gap: 15px;
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .kitty-corner {
      position: absolute;
      top: -40px;
      right: -20px;
      width: 130px;
      z-index: 15;
      animation: kittyFloat 4s ease-in-out infinite;
    }

    @keyframes kittyFloat {
      0%, 100% { transform: translateY(0) rotate(-5deg); }
      50% { transform: translateY(-15px) rotate(5deg); }
    }

    .header { text-align: center; z-index: 2; }

    .avatar-container {
      width: 110px;
      height: 110px;
      margin: 0 auto 10px;
      position: relative;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 5px solid var(--pink-rock);
      background: white;
      overflow: hidden;
      box-shadow: 0 0 20px var(--soft-pink);
    }

    .avatar img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.5s; }

    .main-title {
      font-size: 2rem;
      color: var(--pink-rock);
      text-shadow: 2px 2px var(--white);
    }

    .slide {
      flex: 1;
      border-radius: 35px;
      background: linear-gradient(to bottom, #fff, var(--pastel-pink));
      padding: 25px;
      position: relative;
      overflow: hidden;
      border: 3px dashed var(--soft-pink);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .slide-title { font-size: 1.5rem; color: var(--pink-rock); margin-bottom: 12px; text-align: center; }
    .slide-text { font-size: 1.1rem; line-height: 1.5; color: #444; text-align: center; }

    .pill {
      padding: 8px 18px;
      border-radius: 25px;
      background: white;
      border: 2px solid var(--pastel-pink);
      color: var(--pink-rock);
      font-weight: bold;
      font-size: 0.85rem;
    }

    .game-area {
      height: 160px;
      background: white;
      border-radius: 20px;
      position: relative;
      margin-top: 15px;
      border: 2px solid var(--pastel-pink);
      overflow: hidden;
    }

    .target { position: absolute; width: 55px; height: 55px; cursor: pointer; }

    /* Contenedor de audio personalizado */
    .audio-container {
      margin-top: 10px;
      text-align: center;
    }
    
    audio {
      width: 100%;
      height: 35px;
      border-radius: 10px;
    }

  </style>
</head>
<body>

<div class="bg"></div>
<div class="bg-pattern"></div>
<div id="particle-container"></div>

<div id="app">
  <div class="card" id="main-card">
    <img src="1.png" class="kitty-corner" id="floating-kitty">
    
    <div class="header">
      <div class="avatar-container">
        <div class="avatar">
          <img src="2.png" id="avatar-img" alt="Baby Kitty">
        </div>
      </div>
      <h1 class="main-title">Nuestra Bebé</h1>
    </div>

    <div class="slide" id="slide-content">
      <h2 class="slide-title" id="title">¡Hola!</h2>
      <p class="slide-text" id="text">Cargando magia...</p>
      <div id="extra-content"></div>
      <div class="pill-row" id="pills" style="display:flex; justify-content:center; gap:8px; margin-top:20px;"></div>
    </div>

    <div class="audio-container">
      <audio controls autoplay loop>
        <source src="https://hoovers.101soundboards.com/sb/board_sounds_rendered/wyybajlk.mp3?signature=80EzGmSdQwY7iA6FgjFCUQ&expires=1776373199" type="audio/mpeg">
      </audio>
    </div>

    <div style="text-align:center; margin-top:10px;">
      <p style="color:var(--soft-pink); font-size:0.85rem;">Toca para descubrir la magia ✨</p>
      <div id="dots" style="display:flex; justify-content:center; gap:6px; margin-top:8px;"></div>
    </div>
  </div>
</div>

<script>
  const slides = [
    {
      title: "¡Es una Niña!",
      text: "La familia crece y nuestro corazón también. Te invitamos a celebrar la dulce espera de nuestra bebé en un mundo lleno de lazos y color rosa.",
      img: "1.png",
      pills: ["Amor", "Familia", "Ilusión"]
    },
    {
      title: "Día y Hora",
      text: "<strong>Sábado 2 de mayo</strong><br>A las <strong>3:00 PM</strong><br>¡Preparamos muchas sorpresas para compartir contigo!",
      img: "3.png",
      pills: ["Agéndalo", "No faltes"]
    },
    {
      title: "Lugar del Evento",
      text: "Nos vemos en el Salón Gala. Aquí tienes el mapa para que llegues directo a la fiesta:",
      img: "4.png",
      extra: "map",
      pills: ["Ubicación", "Maps"]
    },
    {
      title: "Mini Juego Rosa",
      text: "¡Ayuda a Kitty! Toca 10 veces el moñito mágico para revelar el siguiente mensaje.",
      img: "5.png",
      extra: "game",
      pills: ["¡A jugar!"]
    },
    {
      title: "Nuestra Invitación",
      text: "Tu compañía es el regalo más hermoso que nuestra pequeña puede recibir. El mejor detalle será compartir este día con nosotros.",
      img: "6.png",
      pills: ["Cordialidad", "Cariño"]
    },
    {
      title: "¡Los Esperamos!",
      text: "Gracias por ser parte de este sueño. ¡Nos vemos muy pronto rodeados de ternura!",
      img: "7.png",
      pills: ["Confirmar", "Con Amor"]
    }
  ];

  let current = 0;
  const slideContent = document.getElementById('slide-content');
  const avatarImg = document.getElementById('avatar-img');

  function createSplash(e) {
    const container = document.getElementById('particle-container');
    const x = e.clientX || (e.touches && e.touches[0].clientX);
    const y = e.clientY || (e.touches && e.touches[0].clientY);

    if (!x || !y) return;

    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'magic-particle';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      
      const dx = (Math.random() - 0.5) * 200 + 'px';
      const dy = (Math.random() - 0.5) * 200 + 'px';
      p.style.setProperty('--dx', dx);
      p.style.setProperty('--dy', dy);
      
      const size = Math.random() * 10 + 5 + 'px';
      p.style.width = size;
      p.style.height = size;
      
      container.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }
  }

  function updateSlide() {
    const s = slides[current];
    slideContent.style.opacity = 0;
    slideContent.style.transform = "translateY(20px)";

    setTimeout(() => {
      document.getElementById('title').innerText = s.title;
      document.getElementById('text').innerHTML = s.text;
      avatarImg.src = s.img;
      avatarImg.style.transform = "scale(1.1) rotate(5deg)";
      
      const pillsDiv = document.getElementById('pills');
      pillsDiv.innerHTML = '';
      s.pills.forEach(p => {
        const span = document.createElement('span');
        span.className = 'pill';
        span.innerText = p;
        pillsDiv.appendChild(span);
      });

      const extra = document.getElementById('extra-content');
      extra.innerHTML = '';
      if(s.extra === 'map') {
        extra.innerHTML = `<a href="https://maps.google.com" target="_blank" style="display:block; background:var(--pink-rock); color:white; text-decoration:none; padding:12px; border-radius:20px; text-align:center; font-weight:bold; margin-top:15px;">📍 Abrir Mapa</a>`;
      } else if(s.extra === 'game') {
        renderGame();
      }

      renderDots();
      slideContent.style.opacity = 1;
      slideContent.style.transform = "translateY(0)";
      setTimeout(() => avatarImg.style.transform = "scale(1) rotate(0deg)", 500);
    }, 300);
  }

  function renderDots() {
    const dotsDiv = document.getElementById('dots');
    dotsDiv.innerHTML = '';
    slides.forEach((_, i) => {
      const d = document.createElement('div');
      d.style.width = '10px';
      d.style.height = '10px';
      d.style.borderRadius = '50%';
      d.style.background = (i === current) ? 'var(--pink-rock)' : 'var(--pastel-pink)';
      dotsDiv.appendChild(d);
    });
  }

  function renderGame() {
    const area = document.createElement('div');
    area.className = 'game-area';
    const target = document.createElement('img');
    target.src = '4.png';
    target.className = 'target';
    let score = 0;

    function move() {
      target.style.left = Math.random() * 80 + '%';
      target.style.top = Math.random() * 60 + '%';
    }

    target.onclick = (e) => {
      e.stopPropagation();
      score++;
      if(score >= 10) {
        document.getElementById('text').innerHTML = "<strong>¡Eres genial!</strong><br>Gracias por jugar con nosotros. 🎀";
        area.remove();
      } else { move(); }
    };
    area.appendChild(target);
    document.getElementById('extra-content').appendChild(area);
    move();
  }

  document.getElementById('main-card').addEventListener('click', (e) => {
    createSplash(e);
    current = (current + 1) % slides.length;
    updateSlide();
  });

  updateSlide();
</script>

</body>
</html>
