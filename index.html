<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby Shower - Hello Kitty Magical Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --pastel-pink: #ffd1dc;
      --pink-rock: #ff1493;
      --soft-pink: #ff85a2;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background-color: var(--pastel-pink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fondo dinámico */
    .bg-pattern {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #fff, var(--pastel-pink));
      z-index: -2;
    }

    .bg-icons {
      position: fixed;
      inset: 0;
      background-image: url('7.png');
      background-size: 150px;
      opacity: 0.05;
      z-index: -1;
      animation: drift 60s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: 1000px 1000px; }
    }

    /* Botón de Sonido (Estilo Alberto Gael) */
    #sound-toggle {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 45px;
      height: 45px;
      border-radius: 999px;
      border: 2px solid var(--pink-rock);
      background: white;
      color: var(--pink-rock);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 4px 10px rgba(255, 20, 147, 0.3);
      cursor: pointer;
      z-index: 100;
    }

    #sound-toggle.off { opacity: 0.5; border-style: dashed; }

    /* Tarjeta */
    .card {
      position: relative;
      width: 90%;
      max-width: 420px;
      height: 82vh;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 40px;
      padding: 25px;
      box-shadow: 0 20px 50px rgba(255, 20, 147, 0.2);
      border: 6px solid var(--white);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .header { text-align: center; margin-bottom: 15px; }
    
    .avatar-frame {
      width: 110px;
      height: 110px;
      margin: 0 auto 10px;
      border: 4px solid var(--pink-rock);
      border-radius: 50%;
      background: white;
      padding: 5px;
      overflow: hidden;
      box-shadow: 0 8px 15px var(--soft-pink);
    }
    .avatar-frame img { width: 100%; height: 100%; object-fit: contain; transition: 0.5s; }

    /* Pantallas */
    .slide-box {
      flex: 1;
      background: linear-gradient(135deg, #fff, #fff9fb);
      border-radius: 30px;
      padding: 20px;
      text-align: center;
      border: 2px dashed var(--soft-pink);
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: 0.4s ease;
    }

    .slide-title { color: var(--pink-rock); font-size: 1.5rem; margin-bottom: 10px; }
    .slide-text { color: #555; font-size: 1rem; line-height: 1.5; }

    /* Efecto Splash Mágico */
    .magic-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 10px var(--pink-rock);
      animation: splash-fly 0.7s ease-out forwards;
      z-index: 1000;
    }

    @keyframes splash-fly {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; transform: translate(var(--dx), var(--dy)); }
    }

    /* Juego */
    .game-zone {
      height: 130px;
      margin-top: 15px;
      background: white;
      border: 1px solid var(--pastel-pink);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }
    .game-obj { position: absolute; width: 45px; height: 45px; cursor: pointer; }

    /* Footer */
    .footer { margin-top: 15px; text-align: center; }
    .dots { display: flex; justify-content: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pastel-pink); transition: 0.3s; }
    .dot.active { background: var(--pink-rock); transform: scale(1.3); }

    .btn-maps {
      display: inline-block;
      margin-top: 15px;
      padding: 8px 20px;
      background: var(--pink-rock);
      color: white;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<div class="bg-pattern"></div>
<div class="bg-icons"></div>
<div id="magic-layer"></div>

<button id="sound-toggle" class="off">
  <span>🔇</span>
</button>

<audio id="bg-music" loop>
  <source src="hello.mp3" type="audio/mpeg">
</audio>

<div id="app">
  <div class="card" id="tap-area">
    <div class="header">
      <div class="avatar-frame">
        <img src="1.png" id="avatar-img">
      </div>
      <h2 style="color:var(--pink-rock); font-size: 1.2rem; text-transform: uppercase;">Baby Shower</h2>
    </div>

    <div class="slide-box" id="slide">
      <h1 class="slide-title" id="title">¡Bienvenid@!</h1>
      <p class="slide-text" id="text">Toca en cualquier parte para iniciar la magia rosa...</p>
      <div id="extra-content"></div>
    </div>

    <div class="footer">
      <p style="font-size: 0.75rem; color: var(--soft-pink); margin-bottom: 8px;">Toca para avanzar 🎀</p>
      <div class="dots" id="dots"></div>
    </div>
  </div>
</div>

<script>
  // Datos igual que en el código de Alberto Gael
  const slides = [
    { title: "¡Es una Niña!", text: "Estamos felices de invitarte a celebrar la dulce espera de nuestra bebé. ¡Será un día lleno de lazos y alegría!", img: "1.png" },
    { title: "Día y Hora", text: "<strong>Sábado 2 de Mayo</strong><br>A las <strong>3:00 PM</strong><br>¡Te esperamos puntualmente para las sorpresas!", img: "3.png" },
    { title: "Ubicación", text: "La cita es en el Salón Gala. Preparamos el mapa para que no te pierdas el camino:", img: "4.png", type: "map" },
    { title: "Mini Juego", text: "¡Ayuda a Kitty! Toca el moño 5 veces para revelar un mensaje especial.", img: "5.png", type: "game" },
    { title: "Tu Compañía", text: "Nuestra bebé no necesita más regalos que tu cariño. Tu presencia es lo más valioso y lo único que esperamos para este gran día.", img: "6.png" },
    { title: "¡Nos vemos!", text: "Gracias por ser parte de este momento tan importante. ¡Los esperamos con mucha ilusión!", img: "7.png" }
  ];

  let current = 0;
  let musicEnabled = false;
  let musicTriedOnce = false;
  const bgMusic = document.getElementById("bg-music");
  const soundToggle = document.getElementById("sound-toggle");
  const avatarImg = document.getElementById("avatar-img");
  const tapArea = document.getElementById("tap-area");

  // EFECTO MÁGICO (SPLASH)
  function createSplash(x, y) {
    const layer = document.getElementById('magic-layer');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'magic-dot';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
      p.style.setProperty('--dy', (Math.random() - 0.5) * 200 + 'px');
      layer.appendChild(p);
      setTimeout(() => p.remove(), 700);
    }
  }

  // MÉTODO DE AUDIO (IGUAL QUE ALBERTO GAEL)
  function tryPlayMusic() {
    if (!bgMusic) return;
    if (!musicEnabled) {
      bgMusic.play().then(() => {
        musicEnabled = true;
        soundToggle.classList.remove("off");
        soundToggle.querySelector("span").textContent = "🔊";
      }).catch(() => {
        // Bloqueado por el navegador
      });
    }
  }

  soundToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!musicEnabled) {
      bgMusic.play().then(() => {
        musicEnabled = true;
        soundToggle.classList.remove("off");
        soundToggle.querySelector("span").textContent = "🔊";
      });
    } else {
      bgMusic.pause();
      musicEnabled = false;
      soundToggle.classList.add("off");
      soundToggle.querySelector("span").textContent = "🔇";
    }
  });

  function render() {
    const s = slides[current];
    const box = document.getElementById('slide');
    box.style.opacity = 0;
    
    setTimeout(() => {
      document.getElementById('title').innerText = s.title;
      document.getElementById('text').innerHTML = s.text;
      avatarImg.src = s.img;
      
      const extra = document.getElementById('extra-content');
      extra.innerHTML = '';
      if(s.type === 'map') {
        extra.innerHTML = `<a href="https://maps.google.com" target="_blank" class="btn-maps" onclick="event.stopPropagation()">📍 Ver en Google Maps</a>`;
      } else if(s.type === 'game') {
        renderGame();
      }

      const dots = document.getElementById('dots');
      dots.innerHTML = '';
      slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === current ? 'active' : ''}`;
        dots.appendChild(d);
      });

      box.style.opacity = 1;
    }, 250);
  }

  function renderGame() {
    const extra = document.getElementById('extra-content');
    const zone = document.createElement('div');
    zone.className = 'game-zone';
    const target = document.createElement('img');
    target.src = '4.png';
    target.className = 'game-obj';
    let hits = 0;

    function move() {
      target.style.left = Math.random() * 80 + '%';
      target.style.top = Math.random() * 60 + '%';
    }

    target.onclick = (e) => {
      e.stopPropagation();
      hits++;
      if(hits >= 5) {
        document.getElementById('text').innerHTML = "<strong>¡Bravo!</strong><br>Nuestra bebé ya quiere conocerte. 🎀";
        zone.remove();
      } else { move(); }
    };
    zone.appendChild(target);
    extra.appendChild(zone);
    move();
  }

  tapArea.addEventListener('click', (e) => {
    createSplash(e.clientX, e.clientY);
    
    // MÉTODO ALBERTO GAEL: Intentar música en el primer clic
    if (!musicTriedOnce) {
      tryPlayMusic();
      musicTriedOnce = true;
    }

    current = (current + 1) % slides.length;
    render();
  });

  render();
</script>
</body>
</html>
