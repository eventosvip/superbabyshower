<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby Shower - Hello Kitty Magical Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --pastel-pink: #ffd1dc;
      --pink-rock: #ff1493;
      --soft-pink: #ff85a2;
      --white: #ffffff;
      --glass: rgba(255, 255, 255, 0.85);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background-color: var(--pastel-pink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fondo animado */
    .bg-animation {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #fff, var(--pastel-pink));
      z-index: -2;
    }

    .bg-pattern {
      position: fixed;
      inset: 0;
      background-image: url('7.png');
      background-size: 150px;
      opacity: 0.05;
      z-index: -1;
      animation: drift 60s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: 1000px 1000px; }
    }

    /* Tarjeta Principal */
    .card {
      position: relative;
      width: 90%;
      max-width: 420px;
      height: 85vh;
      background: var(--glass);
      border-radius: 40px;
      padding: 30px 20px;
      box-shadow: 0 20px 50px rgba(255, 20, 147, 0.15);
      border: 8px solid var(--white);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
      z-index: 10;
      transition: transform 0.3s ease;
    }

    /* Botón de Sonido Elegante */
    #sound-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: var(--white);
      border: 3px solid var(--pink-rock);
      border-radius: 50%;
      cursor: pointer;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      box-shadow: 0 4px 15px rgba(255, 20, 147, 0.2);
      transition: transform 0.2s;
    }

    #sound-btn:active { transform: scale(0.9); }

    /* Avatar y Cabecera */
    .header { text-align: center; margin-bottom: 20px; }
    .avatar-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 10px;
      border: 5px solid var(--pink-rock);
      border-radius: 50%;
      background: white;
      padding: 5px;
      box-shadow: 0 10px 20px var(--soft-pink);
      overflow: hidden;
    }
    .avatar-wrap img { width: 100%; height: 100%; object-fit: contain; }

    /* Slides */
    .slide-container {
      flex: 1;
      background: linear-gradient(135deg, #fff, #fff9fb);
      border-radius: 30px;
      padding: 20px;
      text-align: center;
      border: 2px dashed var(--soft-pink);
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .slide-title { color: var(--pink-rock); font-size: 1.6rem; margin-bottom: 15px; }
    .slide-text { color: #555; line-height: 1.6; font-size: 1.1rem; }

    /* Splash Mágico */
    .magic-splash {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 15px var(--pink-rock);
      animation: splash-anim 0.8s ease-out forwards;
      z-index: 1000;
    }

    @keyframes splash-anim {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; transform: translate(var(--dx), var(--dy)); }
    }

    /* Mini Juego */
    .game-box {
      height: 140px;
      margin-top: 15px;
      background: #fff;
      border: 2px solid var(--pastel-pink);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
    }
    .game-target { position: absolute; width: 50px; height: 50px; cursor: pointer; transition: transform 0.1s; }

    /* Footer */
    .footer { margin-top: 15px; text-align: center; }
    .dots { display: flex; justify-content: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pastel-pink); }
    .dot.active { background: var(--pink-rock); transform: scale(1.3); }

    /* Estilo botón Mapa */
    .btn-map {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 25px;
      background: var(--pink-rock);
      color: white;
      text-decoration: none;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(176, 13, 101, 0.3);
    }
  </style>
</head>
<body>

<div class="bg-animation"></div>
<div class="bg-pattern"></div>
<div id="splash-layer"></div>

<button id="sound-btn">🔇</button>
<audio id="player" loop>
  <source src="hello.mp3" type="audio/mpeg">
</audio>

<div id="app">
  <div class="card" id="touch-area">
    <div class="header">
      <div class="avatar-wrap">
        <img src="1.png" id="avatar">
      </div>
      <h2 style="color:var(--pink-rock); letter-spacing: 2px;">Baby Shower</h2>
    </div>

    <div class="slide-container" id="slide-content">
      <h1 class="slide-title" id="title">¡Hola!</h1>
      <p class="slide-text" id="text">Toca para descubrir esta invitación mágica...</p>
      <div id="extra"></div>
    </div>

    <div class="footer">
      <p style="font-size: 0.8rem; color: var(--soft-pink); margin-bottom: 8px;">Toca para continuar ✨</p>
      <div class="dots" id="dots"></div>
    </div>
  </div>
</div>

<script>
  const slides = [
    {
      title: "¡Es una Niña!",
      text: "Estamos muy emocionados de compartir con ustedes la alegría de la próxima llegada de nuestra princesa.",
      img: "1.png"
    },
    {
      title: "Día y Hora",
      text: "<strong>Sábado 2 de Mayo</strong><br>A las <strong>3:00 PM</strong><br>Prepárate para una tarde llena de ternura.",
      img: "3.png"
    },
    {
      title: "Lugar del Evento",
      text: "Nos vemos en el Salón Gala. ¡Aquí tienes el camino!",
      img: "4.png",
      extra: "map"
    },
    {
      title: "Juego Mágico",
      text: "¡Ayuda a Kitty! Toca el moño 5 veces para revelar el siguiente mensaje.",
      img: "5.png",
      extra: "game"
    },
    {
      title: "El Mejor Regalo",
      text: "Tu compañía y tus buenos deseos son el regalo más valioso para nuestra bebé. El mejor detalle será compartir este día con nosotros.",
      img: "6.png"
    },
    {
      title: "¡Te Esperamos!",
      text: "Gracias por ser parte de nuestra felicidad. ¡Nos vemos pronto!",
      img: "7.png"
    }
  ];

  let current = 0;
  let isPlaying = false;
  const player = document.getElementById('player');
  const soundBtn = document.getElementById('sound-btn');
  const avatar = document.getElementById('avatar');

  // Splash Mágico al hacer clic
  function createSplash(x, y) {
    const layer = document.getElementById('splash-layer');
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'magic-splash';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.setProperty('--dx', (Math.random() - 0.5) * 200 + 'px');
      p.style.setProperty('--dy', (Math.random() - 0.5) * 200 + 'px');
      layer.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }
  }

  function update() {
    const s = slides[current];
    const content = document.getElementById('slide-content');
    
    // Animación suave de salida
    content.style.opacity = 0;
    content.style.transform = "scale(0.95)";

    setTimeout(() => {
      document.getElementById('title').innerText = s.title;
      document.getElementById('text').innerHTML = s.text;
      avatar.src = s.img;
      
      const extra = document.getElementById('extra');
      extra.innerHTML = '';
      if(s.extra === 'map') {
        extra.innerHTML = `<a href="https://maps.google.com" target="_blank" class="btn-map">📍 Ver Ubicación</a>`;
      } else if(s.extra === 'game') {
        renderGame();
      }

      // Actualizar puntos
      const dots = document.getElementById('dots');
      dots.innerHTML = '';
      slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === current ? 'active' : ''}`;
        dots.appendChild(d);
      });

      content.style.opacity = 1;
      content.style.transform = "scale(1)";
    }, 250);
  }

  function renderGame() {
    const extra = document.getElementById('extra');
    const box = document.createElement('div');
    box.className = 'game-box';
    const target = document.createElement('img');
    target.src = '4.png';
    target.className = 'game-target';
    let hits = 0;

    function jump() {
      target.style.left = Math.random() * 80 + '%';
      target.style.top = Math.random() * 60 + '%';
    }

    target.onclick = (e) => {
      e.stopPropagation();
      hits++;
      if(hits >= 5) {
        document.getElementById('text').innerHTML = "<strong>¡Genial!</strong><br>Tienes reflejos mágicos. 🎀";
        box.remove();
      } else { jump(); }
    };
    box.appendChild(target);
    extra.appendChild(box);
    jump();
  }

  // Eventos
  document.getElementById('touch-area').addEventListener('click', (e) => {
    createSplash(e.clientX, e.clientY);
    
    // Auto-play en primer toque
    if(!isPlaying && player.paused) {
      player.play().then(() => {
        isPlaying = true;
        soundBtn.innerText = '🔊';
      });
    }

    current = (current + 1) % slides.length;
    update();
  });

  soundBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if(player.paused) {
      player.play();
      isPlaying = true;
      soundBtn.innerText = '🔊';
    } else {
      player.pause();
      isPlaying = false;
      soundBtn.innerText = '🔇';
    }
  });

  update();
</script>
</body>
</html>
