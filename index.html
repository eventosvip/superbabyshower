<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Baby Shower Romina - Salón Amayrani</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    :root {
      --pastel-pink: #ffd1dc;
      --pink-rock: #ff1493;
      --soft-pink: #ff85a2;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      height: 100vh;
      overflow: hidden;
      background-color: var(--pastel-pink);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Fondos dinámicos */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #fff, var(--pastel-pink));
      z-index: -2;
    }

    .bg-icons {
      position: fixed;
      inset: 0;
      background-image: url('7.png');
      background-size: 140px;
      opacity: 0.06;
      z-index: -1;
      animation: drift 70s linear infinite;
    }

    @keyframes drift {
      from { background-position: 0 0; }
      to { background-position: 1000px 1000px; }
    }

    /* Botón de Sonido */
    #sound-toggle {
      position: fixed;
      top: 15px;
      left: 15px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 3px solid var(--pink-rock);
      background: white;
      color: var(--pink-rock);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
      cursor: pointer;
      z-index: 100;
      transition: 0.3s;
    }
    #sound-toggle.off { opacity: 0.6; border-style: dashed; }

    /* Tarjeta */
    .card {
      position: relative;
      width: 92%;
      max-width: 420px;
      height: 85vh;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 45px;
      padding: 30px 20px;
      box-shadow: 0 25px 60px rgba(255, 20, 147, 0.2);
      border: 7px solid var(--white);
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      z-index: 10;
    }

    .header { text-align: center; margin-bottom: 15px; }
    
    .avatar-frame {
      width: 125px;
      height: 125px;
      margin: 0 auto 10px;
      border: 5px solid var(--pink-rock);
      border-radius: 50%;
      background: white;
      padding: 6px;
      overflow: hidden;
      box-shadow: 0 10px 20px var(--soft-pink);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .avatar-frame img { width: 100%; height: 100%; object-fit: contain; }

    .name-romina {
      font-size: 3rem;
      color: var(--pink-rock);
      text-shadow: 3px 3px 0px var(--white), 5px 5px 15px var(--soft-pink);
      display: block;
      margin: 10px 0;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .slide-box {
      flex: 1;
      background: linear-gradient(135deg, #fff, #fff9fb);
      border-radius: 35px;
      padding: 20px;
      text-align: center;
      border: 3px dashed var(--soft-pink);
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .slide-title { color: var(--pink-rock); font-size: 1.6rem; margin-bottom: 12px; }
    .slide-text { color: #444; font-size: 1.1rem; line-height: 1.6; }

    /* Splash Mágico */
    .magic-spark {
      position: absolute;
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 12px var(--pink-rock);
      animation: spark-fly 0.8s ease-out forwards;
      z-index: 1000;
    }

    @keyframes spark-fly {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0); opacity: 0; transform: translate(var(--dx), var(--dy)); }
    }

    .game-zone {
      height: 140px;
      margin-top: 15px;
      background: white;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      border: 1px solid var(--pastel-pink);
    }
    .game-target { position: absolute; width: 50px; height: 50px; cursor: pointer; }

    .footer { margin-top: 20px; text-align: center; }
    .dots { display: flex; justify-content: center; gap: 7px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pastel-pink); transition: 0.3s; }
    .dot.active { background: var(--pink-rock); transform: scale(1.4); }

    .btn-maps {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 25px;
      background: var(--pink-rock);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      box-shadow: 0 5px 15px rgba(255, 20, 147, 0.3);
    }
  </style>
</head>
<body>

<div class="bg-gradient"></div>
<div class="bg-icons"></div>
<div id="spark-layer"></div>

<button id="sound-toggle" class="off">
  <span>🔇</span>
</button>

<audio id="bg-music" loop>
  <source src="hello.mp3" type="audio/mpeg">
</audio>

<div id="app">
  <div class="card" id="tap-area">
    <div class="header">
      <div class="avatar-frame">
        <img src="1.png" id="avatar">
      </div>
      <p style="color:var(--soft-pink); font-weight:bold; text-transform:uppercase; letter-spacing:2px;">¡Bienvenid@!</p>
    </div>

    <div class="slide-box" id="slide-container">
      <div id="slide-content"></div>
    </div>

    <div class="footer">
      <p style="font-size: 0.8rem; color: var(--soft-pink); margin-bottom: 10px;">Toca para continuar 🎀</p>
      <div class="dots" id="dots"></div>
    </div>
  </div>
</div>

<script>
  const slides = [
    {
      title: "Celebramos a",
      text: "<span class='name-romina'>Romina</span>",
      img: "2.png"
    },
    {
      title: "¡Es una Niña!",
      text: "La familia crece y nuestro corazón también. Te invitamos a celebrar la dulce espera de nuestra bebé Romina en un mundo lleno de lazos y color rosa.",
      img: "1.png"
    },
    {
      title: "Día y Hora",
      text: "<strong>Sábado 2 de Mayo</strong><br>A las <strong>3:00 PM</strong><br>¡Preparamos muchas sorpresas para compartir contigo!",
      img: "3.png"
    },
    {
      title: "Lugar del Evento",
      text: "Nos vemos en el <strong>Salón Amayrani</strong>. Aquí tienes el mapa para que llegues directo a la fiesta:",
      img: "4.png",
      type: "map",
      mapUrl: "https://share.google/buv8m8TSukhxhPIGQ"
    },
    {
      title: "Mini Juego Rosa",
      text: "¡Ayuda a Kitty! Toca 5 veces el moñito para revelar el siguiente mensaje.",
      img: "5.png",
      type: "game"
    },
    {
      title: "Tu Compañía",
      text: "Nuestra pequeña Romina espera tu asistencia que es lo más valioso que esperamos para este gran día. NO FALTES!!!",
      img: "6.png"
    },
    {
      title: "¡Los Esperamos!",
      text: "Gracias por ser parte de este sueño. ¡Nos vemos muy pronto rodeados de ternura!",
      img: "7.png"
    }
  ];

  let current = 0;
  let musicEnabled = false;
  let musicTriedOnce = false;

  const bgMusic = document.getElementById("bg-music");
  const soundToggle = document.getElementById("sound-toggle");
  const avatar = document.getElementById("avatar");
  const tapArea = document.getElementById("tap-area");
  const slideContent = document.getElementById("slide-content");

  function createSplash(x, y) {
    const layer = document.getElementById('spark-layer');
    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'magic-spark';
      p.style.left = x + 'px';
      p.style.top = y + 'px';
      p.style.setProperty('--dx', (Math.random() - 0.5) * 220 + 'px');
      p.style.setProperty('--dy', (Math.random() - 0.5) * 220 + 'px');
      layer.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }
  }

  function tryPlayMusic() {
    if (!bgMusic) return;
    if (!musicEnabled) {
      bgMusic.play().then(() => {
        musicEnabled = true;
        soundToggle.classList.remove("off");
        soundToggle.querySelector("span").textContent = "🔊";
      }).catch(err => console.log("Audio esperando interacción"));
    }
  }

  soundToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    if (!musicEnabled) {
      bgMusic.play();
      musicEnabled = true;
      soundToggle.classList.remove("off");
      soundToggle.querySelector("span").textContent = "🔊";
    } else {
      bgMusic.pause();
      musicEnabled = false;
      soundToggle.classList.add("off");
      soundToggle.querySelector("span").textContent = "🔇";
    }
  });

  function update() {
    const s = slides[current];
    const box = document.getElementById('slide-container');
    
    box.style.opacity = 0;
    box.style.transform = "translateY(15px)";

    setTimeout(() => {
      avatar.src = s.img;
      slideContent.innerHTML = `
        <h1 class="slide-title">${s.title}</h1>
        <div class="slide-text">${s.text}</div>
        <div id="extra-content"></div>
      `;

      if(s.type === 'map') {
        document.getElementById('extra-content').innerHTML = `
          <a href="${s.mapUrl}" target="_blank" class="btn-maps" onclick="event.stopPropagation()">📍 Abrir Salón Amayrani</a>
        `;
      } else if(s.type === 'game') {
        renderGame();
      }

      const dots = document.getElementById('dots');
      dots.innerHTML = '';
      slides.forEach((_, i) => {
        const d = document.createElement('div');
        d.className = `dot ${i === current ? 'active' : ''}`;
        dots.appendChild(d);
      });

      box.style.opacity = 1;
      box.style.transform = "translateY(0)";
    }, 300);
  }

  function renderGame() {
    const extra = document.getElementById('extra-content');
    const zone = document.createElement('div');
    zone.className = 'game-zone';
    const target = document.createElement('img');
    target.src = '4.png';
    target.className = 'game-target';
    let hits = 0;

    function move() {
      target.style.left = Math.random() * 80 + '%';
      target.style.top = Math.random() * 60 + '%';
    }

    target.onclick = (e) => {
      e.stopPropagation();
      hits++;
      if(hits >= 5) {
        document.querySelector('.slide-text').innerHTML = "<strong>¡Felicidades!</strong><br>Romina ya quiere conocerte. 🎀";
        zone.remove();
      } else { move(); }
    };
    zone.appendChild(target);
    extra.appendChild(zone);
    move();
  }

  tapArea.addEventListener('click', (e) => {
    createSplash(e.clientX, e.clientY);
    
    if (!musicTriedOnce) {
      tryPlayMusic();
      musicTriedOnce = true;
    }

    current = (current + 1) % slides.length;
    update();
  });

  update();
</script>
</body>
</html>
